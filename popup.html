<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rejected Draft KO</title>
    <style>
      body {
        min-width: 260px;
        margin: 0;
        padding: 14px;
        color: #1f2933;
        font: 13px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fa;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 15px;
      }

      label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }

      button {
        width: 100%;
        border: 1px solid #b9c1cc;
        border-radius: 6px;
        padding: 8px 10px;
        background: #fff;
        color: #1f2933;
        cursor: pointer;
      }

      #status {
        min-height: 18px;
        margin-top: 10px;
        color: #52606d;
      }
    </style>
  </head>
  <body>
    <h1>Rejected Draft KO</h1>
    <label>
      <input id="enabled" type="checkbox">
      한국어 치환 켜기
    </label>
    <button id="copyMissing" type="button">미번역 문구 복사</button>
    <div id="status" role="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
